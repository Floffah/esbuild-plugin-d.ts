name: Housekeeping

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
        typescript-version: [5.5.2, 5, 6]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun add --no-save --exact typescript@${{ matrix.typescript-version }}
      - run: bun run smoke
      - run: bun run lint
      - run: bun run test
